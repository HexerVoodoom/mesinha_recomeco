<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with soft gradient -->
  <defs>
    <clipPath id="roundedCorner">
      <rect width="512" height="512" rx="80" />
    </clipPath>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE5E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8F6F4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGradient)" clip-path="url(#roundedCorner)"/>
  
  <!-- Image container -->
  <image 
    href="figma:asset/63f1c91888d5013b6ec77f78cfdc3f2164718216.png" 
    x="56" 
    y="56" 
    width="400" 
    height="400"
    preserveAspectRatio="xMidYMid meet"
    clip-path="url(#roundedCorner)"
  />
  
  <!-- Subtle overlay for better icon appearance -->
  <rect width="512" height="512" fill="#F8F6F4" opacity="0.05" clip-path="url(#roundedCorner)"/>
</svg>